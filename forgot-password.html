<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu - Ly Xinh Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow border border-gray-200">
    <h1 class="text-3xl font-bold text-center mb-6">Quên mật khẩu</h1>

    <form id="forgotPasswordForm" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Email đã đăng ký</label>
        <input
          id="forgotEmail"
          type="email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none"
          placeholder="Nhập email"
        />
      </div>

      <div>
        <label class="block mb-1 font-medium">Mật khẩu mới</label>
        <input
          id="newPassword"
          type="password"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none"
          placeholder="Nhập mật khẩu mới"
        />
      </div>

      <div>
        <label class="block mb-1 font-medium">Nhập lại mật khẩu mới</label>
        <input
          id="confirmPassword"
          type="password"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none"
          placeholder="Nhập lại mật khẩu mới"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition"
      >
        Đặt lại mật khẩu
      </button>
    </form>

    <p class="text-center text-gray-500 mt-5">
      <a href="login.html" class="text-orange-500 font-semibold">← Quay lại đăng nhập</a>
    </p>

    <p id="forgotMessage" class="text-center mt-4 font-medium"></p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
