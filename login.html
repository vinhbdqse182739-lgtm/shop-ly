<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Ly Xinh Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow border border-gray-200">
    <h1 class="text-3xl font-bold text-center mb-6">Đăng nhập</h1>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Email</label>
        <input id="loginEmail" type="email" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none" placeholder="Nhập email" />
      </div>

      <div>
        <label class="block mb-1 font-medium">Mật khẩu</label>
        <input id="loginPassword" type="password" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none" placeholder="Nhập mật khẩu" />
      </div>

      <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition">
        Đăng nhập
      </button>
    </form>
    <p class="text-right mt-2">
  <a href="forgot-password.html" class="text-orange-500 font-medium hover:underline">
    Quên mật khẩu?
  </a>
</p>

    <p class="text-center text-gray-500 mt-5">
      Chưa có tài khoản?
      <a href="register.html" class="text-orange-500 font-semibold">Đăng ký</a>
    </p>

    <p id="loginMessage" class="text-center mt-4 font-medium"></p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
